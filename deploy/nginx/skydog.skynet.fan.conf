# 天九至尊 —— Nginx 反向代理配置
# 部署路径建议：/etc/nginx/sites-available/skydog.skynet.fan.conf
# 启用：ln -s /etc/nginx/sites-available/skydog.skynet.fan.conf /etc/nginx/sites-enabled/
#
# 职责：
#   1. 托管前端静态文件（client 构建产物 dist/）
#   2. 反代 /api/ -> Fastify (127.0.0.1:3000)，并剥离 /api 前缀
#   3. 反代 /socket.io/ -> Socket.io，支持 WebSocket 升级
#   4. 强制 HTTPS（HTTP 301 跳转）

# ---- HTTP：仅用于 ACME 校验与跳转 HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name skydog.skynet.fan;

    # Let's Encrypt HTTP-01 校验目录
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主站 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name skydog.skynet.fan;

    # 证书（certbot 申请后自动填充；首次申请前可先注释本段用 HTTP 起服务）
    ssl_certificate     /etc/letsencrypt/live/skydog.skynet.fan/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skydog.skynet.fan/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头（与后端 helmet 互补）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 前端静态资源根目录（client 构建产物）
    root /var/www/goddog/client;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 带哈希的静态资源长缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API：剥离 /api 前缀后转发到 Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Socket.io：保持长连接 + WebSocket 升级
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
